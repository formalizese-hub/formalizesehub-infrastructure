# =====================================================
# CI/CD — formalizesehub-infrastructure
# SAM deploy con código placeholder
#
# main → deploy automático a prod (us-east-2)
# workflow_dispatch → deploy manual (dev o prod)
#
# NOTA: Dev NO se auto-deploya porque el stack ya existe
# y se gestiona desde terminal local.
# =====================================================
name: SAM Deploy Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - "template.yaml"
      - "placeholder/**"

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "environment=prod" >> $GITHUB_OUTPUT
          fi

      - name: Set AWS config for environment
        id: aws
        run: |
          if [[ "${{ steps.env.outputs.environment }}" == "prod" ]]; then
            echo "region=us-east-2" >> $GITHUB_OUTPUT
          else
            echo "region=sa-east-1" >> $GITHUB_OUTPUT
          fi

      # Dev: credenciales directas
      - name: Configure AWS credentials (dev)
        if: steps.env.outputs.environment == 'dev'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ steps.aws.outputs.region }}

      # Prod: asumir role en la cuenta hija
      - name: Configure AWS credentials (prod)
        if: steps.env.outputs.environment == 'prod'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ steps.aws.outputs.region }}
          role-to-assume: ${{ secrets.PROD_ROLE_ARN }}
          role-duration-seconds: 3600
          role-skip-session-tagging: true

      - name: SAM build
        run: sam build

      - name: SAM deploy
        run: |
          ENV="${{ steps.env.outputs.environment }}"
          REGION="${{ steps.aws.outputs.region }}"

          if [[ "$ENV" == "prod" ]]; then
            DB_PASSWORD="${{ secrets.DB_PASSWORD_PROD }}"
            JWT_SECRET="${{ secrets.JWT_SECRET_PROD }}"
          else
            DB_PASSWORD="${{ secrets.DB_PASSWORD_DEV }}"
            JWT_SECRET="${{ secrets.JWT_SECRET_DEV }}"
          fi

          sam deploy \
            --stack-name formalizese-hub \
            --region "$REGION" \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --no-progressbar \
            --resolve-s3 \
            --s3-prefix "formalizese-hub-${ENV}" \
            --parameter-overrides \
              "Environment=${ENV} UseVpc=false DatabasePassword=${DB_PASSWORD} JwtSecret=${JWT_SECRET}"

      - name: Deploy summary
        run: |
          echo "✅ Infrastructure deployed to ${{ steps.env.outputs.environment }} (${{ steps.aws.outputs.region }})"
