# =====================================================
# CI/CD — formalizesehub-infrastructure
# SAM deploy MANUAL — solo via workflow_dispatch
# No se auto-ejecuta en push porque requiere parámetros
# sensibles que no deben estar en GitHub
# =====================================================
name: SAM Deploy Infrastructure

on:
  # Solo ejecución manual desde GitHub UI o CLI
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

env:
  AWS_REGION: sa-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: SAM build
        run: sam build

      - name: SAM deploy
        run: |
          sam deploy \
            --stack-name formalizese-hub \
            --region sa-east-1 \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --no-progressbar \
            --resolve-s3 \
            --s3-prefix "formalizese-hub-${{ inputs.environment }}" \
            --parameter-overrides \
              "Environment=${{ inputs.environment }} \
               DatabasePassword=${{ secrets.DB_PASSWORD }} \
               JwtSecret=${{ secrets.JWT_SECRET }} \
               VpcId=${{ secrets.VPC_ID }} \
               Subnet1Id=${{ secrets.SUBNET_1_ID }} \
               Subnet2Id=${{ secrets.SUBNET_2_ID }}"
