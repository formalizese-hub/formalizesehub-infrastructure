  # ── LAMBDAS: FLUJO DIAN ──────────────────────────────────────────────────────
  # Flujo completo:
  #   POST /dian/download
  #     → API Gateway publica directamente en DianProcessingQueue (responde 202)
  #       → DianProcessingQueue (SQS trigger)
  #         → DianProcessingFunction (hace scraping, descarga Excel, sube a S3)
  #           → InvoiceProcessingQueue (SQS trigger)
  #             → InvoiceProcessingFunction (procesa Excel+XML, persiste en DB)

  # Lambda proxy: POST /dian/download → SQS (reemplaza integración directa VTL)
  DianDownloadProxyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-dian-download-proxy-${Environment}
      CodeUri: ../formalizesehub-dian-download-proxy/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Proxy Lambda - recibe POST /dian/download y envía a SQS
      Timeout: 10
      MemorySize: 256
      # Sin VPC — solo necesita acceso a SQS
      VpcConfig:
        SecurityGroupIds: []
        SubnetIds: []
      Environment:
        Variables:
          SQS_DIAN_PROCESSING_URL: !Ref DianProcessingQueue
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /dian/download
            Method: POST

  DianProcessingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-dian-processing-${Environment}
      CodeUri: ../formalizesehub-dian-download/dist/
      Runtime: nodejs22.x
      Timeout: 300
      MemorySize: 1024
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Consume SQS, hace scraping DIAN, sube ZIP a S3
      # Sin VPC — necesita salida a internet para scraping en catalogo-vpfe.dian.gov.co
      VpcConfig:
        SecurityGroupIds: []
        SubnetIds: []
      Environment:
        Variables:
          S3_BUCKET_NAME: !Ref InvoicesBucket
          SQS_INVOICE_PROCESSING_URL: !Ref InvoiceProcessingQueue
          DB_HOST: !GetAtt PostgreSQLDatabase.Endpoint.Address
          DB_PORT: !GetAtt PostgreSQLDatabase.Endpoint.Port
          DB_NAME: !Ref DatabaseName
          DB_USER: !Ref DatabaseUser
          DB_PASSWORD: !Ref DatabasePassword
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt DianProcessingQueue.Arn
            BatchSize: 1
            FunctionResponseTypes:
              - ReportBatchItemFailures

  InvoiceProcessingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-invoice-processing-${Environment}
      CodeUri: ../formalizesehub-invoice-processing/dist/
      Runtime: nodejs22.x
      Timeout: 300
      MemorySize: 1024
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Consume SQS, descarga ZIP de S3, procesa Excel+XML y persiste en PostgreSQL
      # Sin VPC — necesita salida a internet para descargar XMLs de la DIAN
      # El RDS tiene PubliclyAccessible: true en dev, accesible por endpoint público
      VpcConfig:
        SecurityGroupIds: []
        SubnetIds: []
      Environment:
        Variables:
          S3_BUCKET_NAME: !Ref InvoicesBucket
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt InvoiceProcessingQueue.Arn
            BatchSize: 1
            FunctionResponseTypes:
              - ReportBatchItemFailures

