AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: FormalizeSEHub - Infraestructura consolidada

# ─────────────────────────────────────────────────────────────────────────────
# PARÁMETROS
# Para agregar un nuevo parámetro: añadirlo aquí y referenciarlo con !Ref
# ─────────────────────────────────────────────────────────────────────────────
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  DatabaseName:
    Type: String
    Default: formalizese

  DatabaseUser:
    Type: String
    Default: postgres

  DatabasePassword:
    Type: String
    NoEcho: true
    MinLength: 8

  UseVpc:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Si es true, las Lambdas se despliegan dentro de la VPC (requiere VpcId, Subnet1Id, Subnet2Id)

  VpcId:
    Type: String
    Default: ''
    Description: ID de la VPC existente (requerido si UseVpc=true)

  Subnet1Id:
    Type: String
    Default: ''
    Description: Subnet privada 1 (AZ-a) (requerido si UseVpc=true)

  Subnet2Id:
    Type: String
    Default: ''
    Description: Subnet privada 2 (AZ-b) (requerido si UseVpc=true)

  JwtSecret:
    Type: String
    NoEcho: true
    MinLength: 32
    Description: Clave secreta para firmar JWT (mínimo 32 caracteres)

  SystemOrgId:
    Type: String
    Default: '00000000-0000-0000-0000-000000000001'
    Description: UUID de la organización sistema reservada para el superadmin

# ─────────────────────────────────────────────────────────────────────────────
# GLOBALS — aplican a todas las funciones Lambda salvo override explícito
# Para cambiar runtime/timeout/memoria globalmente, editar aquí
# ─────────────────────────────────────────────────────────────────────────────
Globals:
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization,X-Empresa-Id'"
      AllowOrigin: "'*'"
      MaxAge: "'7200'"
  Function:
    Runtime: nodejs22.x
    Timeout: 30
    MemorySize: 256
    Handler: index.handler
    Environment:
      Variables:
        DB_HOST: !GetAtt PostgreSQLDatabase.Endpoint.Address
        DB_PORT: !GetAtt PostgreSQLDatabase.Endpoint.Port
        DB_NAME: !Ref DatabaseName
        DB_USER: !Ref DatabaseUser
        DB_PASSWORD: !Ref DatabasePassword
        ENVIRONMENT: !Ref Environment
        JWT_SECRET: !Ref JwtSecret
        SYSTEM_ORG_ID: !Ref SystemOrgId

# ─────────────────────────────────────────────────────────────────────────────
# CONDICIONES
# ─────────────────────────────────────────────────────────────────────────────
Conditions:
  IsProd: !Equals [!Ref Environment, prod]
  UseVpcCondition: !Equals [!Ref UseVpc, 'true']

# ─────────────────────────────────────────────────────────────────────────────
# RECURSOS
# ─────────────────────────────────────────────────────────────────────────────
Resources:

  # ── NETWORKING ──────────────────────────────────────────────────────────────
  # Solo se crean si UseVpc=true

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: UseVpcCondition
    Properties:
      GroupDescription: Security group para Lambdas FormalizeSEHub
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: UseVpcCondition
    Properties:
      GroupDescription: Security group para RDS PostgreSQL
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
          Description: Solo acceso desde Lambdas

  # ── RDS POSTGRESQL ──────────────────────────────────────────────────────────

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Condition: UseVpcCondition
    Properties:
      DBSubnetGroupDescription: Subnet group para RDS FormalizeSEHub
      SubnetIds:
        - !Ref Subnet1Id
        - !Ref Subnet2Id

  PostgreSQLDatabase:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub formalizese-db-${Environment}
      DBName: !Ref DatabaseName
      Engine: postgres
      EngineVersion: '15.17'
      DBInstanceClass: !If [IsProd, db.t3.small, db.t3.micro]
      AllocatedStorage: '20'
      StorageType: gp3
      MasterUsername: !Ref DatabaseUser
      MasterUserPassword: !Ref DatabasePassword
      VPCSecurityGroups: !If
        - UseVpcCondition
        - - !Ref RDSSecurityGroup
        - !Ref AWS::NoValue
      DBSubnetGroupName: !If
        - UseVpcCondition
        - !Ref DBSubnetGroup
        - !Ref AWS::NoValue
      PubliclyAccessible: !If [IsProd, false, true]
      BackupRetentionPeriod: !If [IsProd, 7, 1]
      DeletionProtection: !If [IsProd, true, false]

  # ── S3 ──────────────────────────────────────────────────────────────────────

  InvoicesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub formalizese-invoices-${Environment}-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldZips
            Status: Enabled
            ExpirationInDays: !If [IsProd, 90, 30]

  # ── SQS ─────────────────────────────────────────────────────────────────────
  # Flujo: DianDownloadFunction publica → InvoiceProcessingQueue → InvoiceProcessingFunction consume
  #
  # Para agregar una nueva cola:
  #   1. Crear recurso AWS::SQS::Queue aquí
  #   2. Crear su DLQ correspondiente
  #   3. Agregar variable de entorno en la Lambda que publica
  #   4. Agregar Events.SQS en la Lambda que consume

  InvoiceProcessingDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub formalizese-invoice-processing-dlq-${Environment}
      MessageRetentionPeriod: 1209600  # 14 días

  InvoiceProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub formalizese-invoice-processing-${Environment}
      VisibilityTimeout: 900          # 6 min — debe ser >= timeout de la Lambda consumidora
      MessageRetentionPeriod: 1209600 # 14 días
      ReceiveMessageWaitTimeSeconds: 20
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt InvoiceProcessingDLQ.Arn
        maxReceiveCount: 3



  RedistribucionProcessingDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub formalizese-redistribucion-processing-dlq-${Environment}
      MessageRetentionPeriod: 1209600  # 14 días

  RedistribucionProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub formalizese-redistribucion-processing-${Environment}
      VisibilityTimeout: 900           # 15 min — >= timeout de AutoRedistribucionFunction
      MessageRetentionPeriod: 345600   # 4 días
      ReceiveMessageWaitTimeSeconds: 20
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt RedistribucionProcessingDLQ.Arn
        maxReceiveCount: 3

  # ── IAM ROLE PARA LAMBDAS ────────────────────────────────────────────────────
  # Permisos mínimos necesarios. Para agregar permisos a una Lambda específica,
  # usar la propiedad Policies directamente en el recurso AWS::Serverless::Function

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub formalizese-lambda-role-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: FormalizeSEHubPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub ${InvoicesBucket.Arn}/*
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt InvoiceProcessingQueue.Arn
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt InvoiceProcessingQueue.Arn

              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt RedistribucionProcessingQueue.Arn
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt RedistribucionProcessingQueue.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:formalizese/email-poller/gmail-credentials*
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:formalizese-invoice-processing-${Environment}

  # ── API GATEWAY ──────────────────────────────────────────────────────────────
  # Un único API Gateway para todos los servicios.
  # Para agregar un nuevo endpoint: solo agregar Events en la Lambda correspondiente,
  # SAM lo registra automáticamente en este API.

  FormalizeSEApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub FormalizeSEHub-API-${Environment}
      StageName: !Ref Environment
      Description: API Gateway con CORS habilitado
      BinaryMediaTypes:
        - 'application/octet-stream'
        - 'multipart/form-data'
        - 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
      Cors:
        AllowMethods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Empresa-Id'"
        AllowOrigin: "'*'"
        MaxAge: "'7200'"
      GatewayResponses:
        DEFAULT_4XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Empresa-Id'"
              Access-Control-Allow-Methods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
        DEFAULT_5XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Empresa-Id'"
              Access-Control-Allow-Methods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"

  # ── LAMBDAS: EMPRESAS ────────────────────────────────────────────────────────
  # Para agregar un nuevo endpoint de clientes:
  #   1. Crear el servicio en formalizesehub-empresa/services/nuevo-servicio/
  #   2. Agregar la función aquí siguiendo el mismo patrón
  #   3. Ejecutar npm run build en el repo de cliente
  #   4. Hacer deploy

  ListarClientesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-listar-empresas-${Environment}
      CodeUri: ../formalizesehub-empresa/services/listar-empresas/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      VpcConfig: !If
        - UseVpcCondition
        - SecurityGroupIds:
            - !Ref LambdaSecurityGroup
          SubnetIds:
            - !Ref Subnet1Id
            - !Ref Subnet2Id
        - !Ref AWS::NoValue
      Description: Lista todas las empresas activas
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /empresas
            Method: GET

  ListarClientesByIdFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-listar-empresas-id-${Environment}
      CodeUri: ../formalizesehub-empresa/services/listar-empresas-id/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      VpcConfig: !If
        - UseVpcCondition
        - SecurityGroupIds:
            - !Ref LambdaSecurityGroup
          SubnetIds:
            - !Ref Subnet1Id
            - !Ref Subnet2Id
        - !Ref AWS::NoValue
      Description: Obtiene una empresa por ID
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /empresas/{id}
            Method: GET

  CrearClienteFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-crear-empresa-${Environment}
      CodeUri: ../formalizesehub-empresa/services/crear-empresa/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      VpcConfig: !If
        - UseVpcCondition
        - SecurityGroupIds:
            - !Ref LambdaSecurityGroup
          SubnetIds:
            - !Ref Subnet1Id
            - !Ref Subnet2Id
        - !Ref AWS::NoValue
      Description: Crea una nueva empresa
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /empresas
            Method: POST

  ActualizarClienteFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-actualizar-empresa-${Environment}
      CodeUri: ../formalizesehub-empresa/services/actualizar-empresa/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      VpcConfig: !If
        - UseVpcCondition
        - SecurityGroupIds:
            - !Ref LambdaSecurityGroup
          SubnetIds:
            - !Ref Subnet1Id
            - !Ref Subnet2Id
        - !Ref AWS::NoValue
      Description: Actualiza una empresa existente
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /empresas/{id}
            Method: PUT

  EliminarClienteFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-eliminar-empresa-${Environment}
      CodeUri: ../formalizesehub-empresa/services/eliminar-empresa/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      VpcConfig: !If
        - UseVpcCondition
        - SecurityGroupIds:
            - !Ref LambdaSecurityGroup
          SubnetIds:
            - !Ref Subnet1Id
            - !Ref Subnet2Id
        - !Ref AWS::NoValue
      Description: Elimina lógicamente una empresa
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /empresas/{id}
            Method: DELETE

  # ── LAMBDAS: DESCARGAS ─────────────────────────────────────────────────────

  ListarDescargasFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-listar-descargas-${Environment}
      CodeUri: ../formalizesehub-descargas/services/listar-descargas/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      VpcConfig: !If
        - UseVpcCondition
        - SecurityGroupIds:
            - !Ref LambdaSecurityGroup
          SubnetIds:
            - !Ref Subnet1Id
            - !Ref Subnet2Id
        - !Ref AWS::NoValue
      Description: Lista descargas por cliente
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /descargas
            Method: GET

  DetalleDescargaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-detalle-descarga-${Environment}
      CodeUri: ../formalizesehub-descargas/services/listar-descargas/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      VpcConfig: !If
        - UseVpcCondition
        - SecurityGroupIds:
            - !Ref LambdaSecurityGroup
          SubnetIds:
            - !Ref Subnet1Id
            - !Ref Subnet2Id
        - !Ref AWS::NoValue
      Description: Detalle de una descarga con facturas y proveedores
      Environment:
        Variables:
          INVOICES_BUCKET_NAME: !Ref InvoicesBucket
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /descargas/{id}
            Method: GET

  DetalleFacturaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-detalle-factura-${Environment}
      CodeUri: ../formalizesehub-descargas/services/detalle-factura/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      VpcConfig: !If
        - UseVpcCondition
        - SecurityGroupIds:
            - !Ref LambdaSecurityGroup
          SubnetIds:
            - !Ref Subnet1Id
            - !Ref Subnet2Id
        - !Ref AWS::NoValue
      Description: Detalle de una factura con productos e impuestos
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /facturas/{id}
            Method: GET

  ActualizarGrupoRetencionFacturaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-actualizar-grupo-retencion-factura-${Environment}
      CodeUri: ../formalizesehub-descargas/services/actualizar-grupo-retencion-factura/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      VpcConfig: !If
        - UseVpcCondition
        - SecurityGroupIds:
            - !Ref LambdaSecurityGroup
          SubnetIds:
            - !Ref Subnet1Id
            - !Ref Subnet2Id
        - !Ref AWS::NoValue
      Description: Actualiza datos de pre-validacion de grupo de retencion en una factura
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /facturas/{id}/grupo-retencion
            Method: PATCH

  ValidarExcelFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-validar-excel-${Environment}
      CodeUri: ../formalizesehub-descargas/services/validar-excel/dist.zip
      Timeout: 60
      Role: !GetAtt LambdaExecutionRole.Arn
      VpcConfig: !If
        - UseVpcCondition
        - SecurityGroupIds:
            - !Ref LambdaSecurityGroup
          SubnetIds:
            - !Ref Subnet1Id
            - !Ref Subnet2Id
        - !Ref AWS::NoValue
      Description: Valida CUFEs del Excel DIAN contra facturas en BBDD y dispara redistribución automática
      MemorySize: 1024
      Environment:
        Variables:
          REDISTRIBUCION_QUEUE_URL: !Ref RedistribucionProcessingQueue
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /descargas/validar-excel
            Method: POST

  FacturasManualesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-facturas-manuales-${Environment}
      CodeUri: ../formalizesehub-descargas/services/facturas-manuales/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      VpcConfig: !If
        - UseVpcCondition
        - SecurityGroupIds:
            - !Ref LambdaSecurityGroup
          SubnetIds:
            - !Ref Subnet1Id
            - !Ref Subnet2Id
        - !Ref AWS::NoValue
      Environment:
        Variables:
          S3_BUCKET: !Ref InvoicesBucket
          INVOICE_PROCESSING_FUNCTION: !Sub formalizese-invoice-processing-${Environment}
      Description: Subida manual de facturas faltantes (ZIP con XML+PDF)
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /descargas/facturas-manuales
            Method: POST

  # ── LAMBDAS: CUENTAS CONTABLES ───────────────────────────────────────────────

  ListarCuentasContablesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-listar-cuentas-contables-${Environment}
      CodeUri: ../formalizesehub-cuentas-contables/services/listar-cuentas-contables/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      VpcConfig: !If
        - UseVpcCondition
        - SecurityGroupIds:
            - !Ref LambdaSecurityGroup
          SubnetIds:
            - !Ref Subnet1Id
            - !Ref Subnet2Id
        - !Ref AWS::NoValue
      Description: Lista todas las cuentas contables activas
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /cuentas-contables
            Method: GET

  ListarCuentasContablesByIdFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-listar-cuentas-contables-id-${Environment}
      CodeUri: ../formalizesehub-cuentas-contables/services/listar-cuentas-contables-id/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      VpcConfig: !If
        - UseVpcCondition
        - SecurityGroupIds:
            - !Ref LambdaSecurityGroup
          SubnetIds:
            - !Ref Subnet1Id
            - !Ref Subnet2Id
        - !Ref AWS::NoValue
      Description: Obtiene una cuenta contable por ID
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /cuentas-contables/{id}
            Method: GET

  CrearCuentaContableFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-crear-cuenta-contable-${Environment}
      CodeUri: ../formalizesehub-cuentas-contables/services/crear-cuenta-contable/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      VpcConfig: !If
        - UseVpcCondition
        - SecurityGroupIds:
            - !Ref LambdaSecurityGroup
          SubnetIds:
            - !Ref Subnet1Id
            - !Ref Subnet2Id
        - !Ref AWS::NoValue
      Description: Crea una nueva cuenta contable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /cuentas-contables
            Method: POST

  ActualizarCuentaContableFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-actualizar-cuenta-contable-${Environment}
      CodeUri: ../formalizesehub-cuentas-contables/services/actualizar-cuenta-contable/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      VpcConfig: !If
        - UseVpcCondition
        - SecurityGroupIds:
            - !Ref LambdaSecurityGroup
          SubnetIds:
            - !Ref Subnet1Id
            - !Ref Subnet2Id
        - !Ref AWS::NoValue
      Description: Actualiza una cuenta contable existente
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /cuentas-contables/{id}
            Method: PUT

  EliminarCuentaContableFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-eliminar-cuenta-contable-${Environment}
      CodeUri: ../formalizesehub-cuentas-contables/services/eliminar-cuenta-contable/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      VpcConfig: !If
        - UseVpcCondition
        - SecurityGroupIds:
            - !Ref LambdaSecurityGroup
          SubnetIds:
            - !Ref Subnet1Id
            - !Ref Subnet2Id
        - !Ref AWS::NoValue
      Description: Elimina lógicamente una cuenta contable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /cuentas-contables/{id}
            Method: DELETE

  CargarMasivaCuentasFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-cargar-masiva-cuentas-${Environment}
      CodeUri: ../formalizesehub-cuentas-contables/services/cargar-masiva/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      VpcConfig: !If
        - UseVpcCondition
        - SecurityGroupIds:
            - !Ref LambdaSecurityGroup
          SubnetIds:
            - !Ref Subnet1Id
            - !Ref Subnet2Id
        - !Ref AWS::NoValue
      Description: Carga masiva de cuentas contables desde Excel
      Timeout: 60
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /cuentas-contables/cargar-masiva
            Method: POST

  DescargarMasivaCuentasFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-descargar-masiva-cuentas-${Environment}
      CodeUri: ../formalizesehub-cuentas-contables/services/descargar-masiva/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      VpcConfig: !If
        - UseVpcCondition
        - SecurityGroupIds:
            - !Ref LambdaSecurityGroup
          SubnetIds:
            - !Ref Subnet1Id
            - !Ref Subnet2Id
        - !Ref AWS::NoValue
      Description: Descarga masiva de cuentas contables a Excel
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /cuentas-contables/descargar
            Method: GET

  # ── LAMBDAS: PARAMETRIZACIÓN ─────────────────────────────────────────────────

  ListarCuentasProveedoresFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-listar-cuentas-proveedores-${Environment}
      CodeUri: ../formalizesehub-parametrizacion/services/listar-cuentas-proveedores/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      VpcConfig: !If
