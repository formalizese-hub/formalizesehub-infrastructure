  # ── LAMBDAS: PROCESAMIENTO DE FACTURAS ─────────────────────────────────────
  # Flujo actual (Gmail):
  #   EventBridge → EmailInvoicePoller → S3 + SQS (InvoiceProcessingQueue)
  #     → InvoiceProcessingFunction (procesa Excel+XML, persiste en DB)
  #
  # Flujo DIAN (DEPRECADO — código preservado en repos dian-download y dian-download-proxy)

  InvoiceProcessingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-invoice-processing-${Environment}
      CodeUri: ../formalizesehub-invoice-processing/dist/
      Runtime: nodejs22.x
      Timeout: 900
      MemorySize: 2048
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Consume SQS, descarga ZIP de S3, procesa Excel+XML y persiste en PostgreSQL
      ReservedConcurrentExecutions: 5
      # Sin VPC — necesita salida a internet para descargar XMLs de la DIAN
      # El RDS tiene PubliclyAccessible: true en dev, accesible por endpoint público
      VpcConfig:
        SecurityGroupIds: []
        SubnetIds: []
      Environment:
        Variables:
          S3_BUCKET_NAME: !Ref InvoicesBucket
          REDISTRIBUCION_QUEUE_URL: !Ref RedistribucionProcessingQueue
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt InvoiceProcessingQueue.Arn
            BatchSize: 1
            ScalingConfig:
              MaximumConcurrency: 5  # Máximo 5 Lambdas concurrentes — protege RDS db.t3.micro de saturación de conexiones
            FunctionResponseTypes:
              - ReportBatchItemFailures

  EmailInvoicePollerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-email-invoice-poller-${Environment}
      CodeUri: ../formalizesehub-email-poller/dist/
      Runtime: nodejs20.x
      Handler: index.handler
      Timeout: 300
      MemorySize: 512
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Polling Gmail cada 5 min — descarga ZIPs de facturas y encola en SQS
      VpcConfig:
        SecurityGroupIds: []
        SubnetIds: []
      Environment:
        Variables:
          GMAIL_SECRET_NAME: "formalizese/email-poller/gmail-credentials"
          GMAIL_USER_EMAIL: !Sub "{{resolve:ssm:/formalizese/${Environment}/gmail-user-email}}"
          SQS_QUEUE_URL: !Ref InvoiceProcessingQueue
          S3_BUCKET: !Ref InvoicesBucket
      Events:
        SchedulePollerMorning:
          Type: Schedule
          Properties:
            Schedule: cron(0 15 * * ? *)   # 10:00am Colombia (UTC-5)
            Description: Polling buzón de facturas Gmail - 10am
            Enabled: true
        SchedulePollerAfternoon:
          Type: Schedule
          Properties:
            Schedule: cron(0 21 * * ? *)   # 4:00pm Colombia (UTC-5)
            Description: Polling buzón de facturas Gmail - 4pm
            Enabled: true

