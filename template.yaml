# ─────────────────────────────────────────────────────────────────────────────
# MONITORING: SNS + CLOUDWATCH ALARMS
# ─────────────────────────────────────────────────────────────────────────────

  AlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub formalizese-alerts-${Environment}
      Subscription:
        - Protocol: email
          Endpoint: dario1091@gmail.com

  AlarmDLQInvoiceProcessing:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub formalizese-dlq-invoice-processing-${Environment}
      AlarmDescription: Hay facturas que fallaron procesamiento (mensajes en DLQ)
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt InvoiceProcessingDLQ.QueueName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlertsTopic

  AlarmDLQRedistribucion:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub formalizese-dlq-redistribucion-${Environment}
      AlarmDescription: Hay redistribuciones que fallaron procesamiento (mensajes en DLQ)
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt RedistribucionProcessingDLQ.QueueName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlertsTopic

  AlarmApiGateway5xx:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub formalizese-api-5xx-${Environment}
      AlarmDescription: API Gateway retornando errores 5xx a los usuarios
      Namespace: AWS/ApiGateway
      MetricName: 5XXError
      Dimensions:
        - Name: ApiName
          Value: !Sub FormalizeSEHub-API-${Environment}
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlertsTopic

# ─────────────────────────────────────────────────────────────────────────────
# OUTPUTS
# ─────────────────────────────────────────────────────────────────────────────
Outputs:
  ApiUrl:
    Description: URL base del API Gateway
    Value: !Sub https://${FormalizeSEApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
    Export:
      Name: !Sub FormalizeSEHub-ApiUrl-${Environment}

  DatabaseEndpoint:
    Description: Endpoint de PostgreSQL
    Value: !GetAtt PostgreSQLDatabase.Endpoint.Address
    Export:
      Name: !Sub FormalizeSEHub-DB-Endpoint-${Environment}

  InvoicesBucketName:
    Description: Bucket S3 para facturas DIAN
    Value: !Ref InvoicesBucket
    Export:
      Name: !Sub FormalizeSEHub-InvoicesBucket-${Environment}

  InvoiceProcessingQueueUrl:
    Description: URL de la cola SQS de procesamiento
    Value: !Ref InvoiceProcessingQueue
    Export:
      Name: !Sub FormalizeSEHub-InvoiceProcessingQueue-${Environment}

  RedistribucionProcessingQueueUrl:
