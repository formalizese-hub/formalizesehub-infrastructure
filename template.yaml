AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: FormalizeSEHub - Infraestructura consolidada

# ─────────────────────────────────────────────────────────────────────────────
# PARÁMETROS
# Para agregar un nuevo parámetro: añadirlo aquí y referenciarlo con !Ref
# ─────────────────────────────────────────────────────────────────────────────
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  DatabaseName:
    Type: String
    Default: formalizese

  DatabaseUser:
    Type: String
    Default: postgres

  DatabasePassword:
    Type: String
    NoEcho: true
    MinLength: 8

  VpcId:
    Type: String
    Description: ID de la VPC existente

  Subnet1Id:
    Type: String
    Description: Subnet privada 1 (AZ-a)

  Subnet2Id:
    Type: String
    Description: Subnet privada 2 (AZ-b)

  JwtSecret:
    Type: String
    NoEcho: true
    MinLength: 32
    Description: Clave secreta para firmar JWT (mínimo 32 caracteres)

  SystemOrgId:
    Type: String
    Default: '00000000-0000-0000-0000-000000000001'
    Description: UUID de la organización sistema reservada para el superadmin

# ─────────────────────────────────────────────────────────────────────────────
# GLOBALS — aplican a todas las funciones Lambda salvo override explícito
# Para cambiar runtime/timeout/memoria globalmente, editar aquí
# ─────────────────────────────────────────────────────────────────────────────
Globals:
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT, PATCH,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization,X-Cliente-Id'"
      AllowOrigin: "'*'"
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 512
    Handler: index.handler
    VpcConfig:
      SecurityGroupIds:
        - !Ref LambdaSecurityGroup
      SubnetIds:
        - !Ref Subnet1Id
        - !Ref Subnet2Id
    Environment:
      Variables:
        DB_HOST: !GetAtt PostgreSQLDatabase.Endpoint.Address
        DB_PORT: !GetAtt PostgreSQLDatabase.Endpoint.Port
        DB_NAME: !Ref DatabaseName
        DB_USER: !Ref DatabaseUser
        DB_PASSWORD: !Ref DatabasePassword
        ENVIRONMENT: !Ref Environment
        JWT_SECRET: !Ref JwtSecret
        SYSTEM_ORG_ID: !Ref SystemOrgId

# ─────────────────────────────────────────────────────────────────────────────
# CONDICIONES
# ─────────────────────────────────────────────────────────────────────────────
Conditions:
  IsProd: !Equals [!Ref Environment, prod]

# ─────────────────────────────────────────────────────────────────────────────
# RECURSOS
# ─────────────────────────────────────────────────────────────────────────────
Resources:

  # ── NETWORKING ──────────────────────────────────────────────────────────────

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group para Lambdas FormalizeSEHub
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group para RDS PostgreSQL
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
          Description: Solo acceso desde Lambdas

  # ── RDS POSTGRESQL ──────────────────────────────────────────────────────────

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group para RDS FormalizeSEHub
      SubnetIds:
        - !Ref Subnet1Id
        - !Ref Subnet2Id

  PostgreSQLDatabase:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub formalizese-db-${Environment}
      DBName: !Ref DatabaseName
      Engine: postgres
      EngineVersion: '15.17'
      DBInstanceClass: !If [IsProd, db.t3.small, db.t3.micro]
      AllocatedStorage: '20'
      StorageType: gp3
      MasterUsername: !Ref DatabaseUser
      MasterUserPassword: !Ref DatabasePassword
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      DBSubnetGroupName: !Ref DBSubnetGroup
      PubliclyAccessible: !If [IsProd, false, true]
      BackupRetentionPeriod: !If [IsProd, 7, 1]
      DeletionProtection: !If [IsProd, true, false]

  # ── S3 ──────────────────────────────────────────────────────────────────────

  InvoicesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub formalizese-invoices-${Environment}-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldZips
            Status: Enabled
            ExpirationInDays: !If [IsProd, 90, 30]

  # ── SQS ─────────────────────────────────────────────────────────────────────
  # Flujo: DianDownloadFunction publica → InvoiceProcessingQueue → InvoiceProcessingFunction consume
  #
  # Para agregar una nueva cola:
  #   1. Crear recurso AWS::SQS::Queue aquí
  #   2. Crear su DLQ correspondiente
  #   3. Agregar variable de entorno en la Lambda que publica
  #   4. Agregar Events.SQS en la Lambda que consume

  InvoiceProcessingDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub formalizese-invoice-processing-dlq-${Environment}
      MessageRetentionPeriod: 1209600  # 14 días

  InvoiceProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub formalizese-invoice-processing-${Environment}
      VisibilityTimeout: 360          # 6 min — debe ser >= timeout de la Lambda consumidora
      MessageRetentionPeriod: 1209600 # 14 días
      ReceiveMessageWaitTimeSeconds: 20
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt InvoiceProcessingDLQ.Arn
        maxReceiveCount: 3

  DianProcessingDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub formalizese-dian-processing-dlq-${Environment}
      MessageRetentionPeriod: 1209600  # 14 días

  DianProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub formalizese-dian-processing-${Environment}
      VisibilityTimeout: 360          # 6 min — >= timeout de DianProcessingFunction
      MessageRetentionPeriod: 1209600 # 14 días
      ReceiveMessageWaitTimeSeconds: 20
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DianProcessingDLQ.Arn
        maxReceiveCount: 3

  # ── IAM ROLE PARA LAMBDAS ────────────────────────────────────────────────────
  # Permisos mínimos necesarios. Para agregar permisos a una Lambda específica,
  # usar la propiedad Policies directamente en el recurso AWS::Serverless::Function

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub formalizese-lambda-role-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: FormalizeSEHubPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub ${InvoicesBucket.Arn}/*
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt InvoiceProcessingQueue.Arn
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt InvoiceProcessingQueue.Arn
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt DianProcessingQueue.Arn
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt DianProcessingQueue.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  # ── API GATEWAY ──────────────────────────────────────────────────────────────
  # Un único API Gateway para todos los servicios.
  # Para agregar un nuevo endpoint: solo agregar Events en la Lambda correspondiente,
  # SAM lo registra automáticamente en este API.

  FormalizeSEApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub FormalizeSEHub-API-${Environment}
      StageName: !Ref Environment
      Description: API Gateway con CORS habilitado
      BinaryMediaTypes:
        - 'application/octet-stream'
        - 'multipart/form-data'
        - 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
      Cors:
        AllowMethods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Cliente-Id'"
        AllowOrigin: "'*'"
      GatewayResponses:
        DEFAULT_4XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Cliente-Id'"
              Access-Control-Allow-Methods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
        DEFAULT_5XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Cliente-Id'"
              Access-Control-Allow-Methods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"

  # ── LAMBDAS: CLIENTES ────────────────────────────────────────────────────────
  # Para agregar un nuevo endpoint de clientes:
  #   1. Crear el servicio en formalizesehub-cliente/services/nuevo-servicio/
  #   2. Agregar la función aquí siguiendo el mismo patrón
  #   3. Ejecutar npm run build en el repo de cliente
  #   4. Hacer deploy

  ListarClientesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-listar-clientes-${Environment}
      CodeUri: ../formalizesehub-cliente/services/listar-clientes/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Lista todos los clientes activos
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /clientes
            Method: GET

  ListarClientesByIdFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-listar-clientes-id-${Environment}
      CodeUri: ../formalizesehub-cliente/services/listar-clientes-id/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Obtiene un cliente por ID
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /clientes/{id}
            Method: GET

  CrearClienteFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-crear-cliente-${Environment}
      CodeUri: ../formalizesehub-cliente/services/crear-cliente/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Crea un nuevo cliente
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /clientes
            Method: POST

  ActualizarClienteFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-actualizar-cliente-${Environment}
      CodeUri: ../formalizesehub-cliente/services/actualizar-cliente/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Actualiza un cliente existente
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /clientes/{id}
            Method: PUT

  EliminarClienteFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-eliminar-cliente-${Environment}
      CodeUri: ../formalizesehub-cliente/services/eliminar-cliente/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Elimina lógicamente un cliente
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /clientes/{id}
            Method: DELETE

  # ── LAMBDAS: DESCARGAS ─────────────────────────────────────────────────────

  ListarDescargasFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-listar-descargas-${Environment}
      CodeUri: ../formalizesehub-descargas/services/listar-descargas/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Lista descargas por cliente
      Environment:
        Variables:
          INVOICES_BUCKET_NAME: !Ref InvoicesBucket
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /descargas
            Method: GET

  DetalleDescargaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-detalle-descarga-${Environment}
      CodeUri: ../formalizesehub-descargas/services/listar-descargas/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Detalle de una descarga con facturas y proveedores
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /descargas/{id}
            Method: GET

  DetalleFacturaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-detalle-factura-${Environment}
      CodeUri: ../formalizesehub-descargas/services/detalle-factura/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Detalle de una factura con productos e impuestos
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /facturas/{id}
            Method: GET

  ActualizarGrupoRetencionFacturaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-actualizar-grupo-retencion-factura-${Environment}
      CodeUri: ../formalizesehub-descargas/services/actualizar-grupo-retencion-factura/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Actualiza datos de pre-validacion de grupo de retencion en una factura
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /facturas/{id}/grupo-retencion
            Method: PATCH

  # ── LAMBDAS: CUENTAS CONTABLES ───────────────────────────────────────────────

  ListarCuentasContablesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-listar-cuentas-contables-${Environment}
      CodeUri: ../formalizesehub-cuentas-contables/services/listar-cuentas-contables/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Lista todas las cuentas contables activas
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /cuentas-contables
            Method: GET

  ListarCuentasContablesByIdFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-listar-cuentas-contables-id-${Environment}
      CodeUri: ../formalizesehub-cuentas-contables/services/listar-cuentas-contables-id/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Obtiene una cuenta contable por ID
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /cuentas-contables/{id}
            Method: GET

  CrearCuentaContableFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-crear-cuenta-contable-${Environment}
      CodeUri: ../formalizesehub-cuentas-contables/services/crear-cuenta-contable/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Crea una nueva cuenta contable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /cuentas-contables
            Method: POST

  ActualizarCuentaContableFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-actualizar-cuenta-contable-${Environment}
      CodeUri: ../formalizesehub-cuentas-contables/services/actualizar-cuenta-contable/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Actualiza una cuenta contable existente
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /cuentas-contables/{id}
            Method: PUT

  EliminarCuentaContableFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-eliminar-cuenta-contable-${Environment}
      CodeUri: ../formalizesehub-cuentas-contables/services/eliminar-cuenta-contable/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Elimina lógicamente una cuenta contable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /cuentas-contables/{id}
            Method: DELETE

  CargarMasivaCuentasFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-cargar-masiva-cuentas-${Environment}
      CodeUri: ../formalizesehub-cuentas-contables/services/cargar-masiva/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Carga masiva de cuentas contables desde Excel
      Timeout: 60
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /cuentas-contables/cargar-masiva
            Method: POST

  # ── LAMBDAS: PARAMETRIZACIÓN ─────────────────────────────────────────────────

  ListarCuentasProveedoresFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-listar-cuentas-proveedores-${Environment}
      CodeUri: ../formalizesehub-parametrizacion/services/listar-cuentas-proveedores/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Lista cuentas contables asociadas a proveedores
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /proveedores-por-cuentas
            Method: GET

  ListarCuentasProveedorByIdFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-listar-cuentas-proveedor-id-${Environment}
      CodeUri: ../formalizesehub-parametrizacion/services/listar-cuentas-proveedor-id/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Lista cuentas de un proveedor por ID
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /proveedores-por-cuentas/{id}
            Method: GET

  CrearCuentaProveedorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-crear-cuenta-proveedor-${Environment}
      CodeUri: ../formalizesehub-parametrizacion/services/crear-cuenta-proveedor/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Crea una cuenta para un proveedor
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /proveedores-por-cuentas
            Method: POST

  ActualizarCuentaProveedorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-actualizar-cuenta-proveedor-${Environment}
      CodeUri: ../formalizesehub-parametrizacion/services/actualizar-cuenta-proveedor/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Actualiza una cuenta de proveedor
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /proveedores-por-cuentas/{id}
            Method: PUT

  EliminarCuentaProveedorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-eliminar-cuenta-proveedor-${Environment}
      CodeUri: ../formalizesehub-parametrizacion/services/eliminar-cuenta-proveedor/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Elimina lógicamente una cuenta de proveedor
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /proveedores-por-cuentas/{id}
            Method: DELETE

  # ── LAMBDAS: PROVEEDORES ─────────────────────────────────────────────────────

  ListarProveedoresFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-listar-proveedores-${Environment}
      CodeUri: ../formalizesehub-proveedores/services/listar-proveedores/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Lista todos los proveedores activos
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /proveedores
            Method: GET

  ListarProveedoresByIdFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-listar-proveedores-id-${Environment}
      CodeUri: ../formalizesehub-proveedores/services/listar-proveedores-id/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Obtiene un proveedor por ID
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /proveedores/{id}
            Method: GET

  CrearProveedorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-crear-proveedor-${Environment}
      CodeUri: ../formalizesehub-proveedores/services/crear-proveedor/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Crea un nuevo proveedor
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /proveedores
            Method: POST

  ActualizarProveedorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-actualizar-proveedor-${Environment}
      CodeUri: ../formalizesehub-proveedores/services/actualizar-proveedor/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Actualiza un proveedor existente
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /proveedores/{id}
            Method: PUT

  EliminarProveedorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-eliminar-proveedor-${Environment}
      CodeUri: ../formalizesehub-proveedores/services/eliminar-proveedor/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Elimina lógicamente un proveedor
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /proveedores/{id}
            Method: DELETE

  # ── LAMBDAS: RETENCIONES ─────────────────────────────────────────────────────
  # Para agregar un nuevo endpoint de retenciones:
  #   1. Crear el servicio en formalizesehub-retenciones/services/nuevo-servicio/
  #   2. Agregar la función aquí siguiendo el mismo patrón
  #   3. Ejecutar npm run build en el repo de retenciones
  #   4. Hacer deploy

  ListarRetencionesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-listar-retenciones-${Environment}
      CodeUri: ../formalizesehub-retenciones/services/listar-retenciones/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Lista todas las retenciones activas
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /retenciones
            Method: GET

  ListarRetencionesByIdFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-listar-retenciones-id-${Environment}
      CodeUri: ../formalizesehub-retenciones/services/listar-retenciones-id/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Obtiene una retención por ID
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /retenciones/{id}
            Method: GET

  CrearRetencionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub formalizese-crear-retencion-${Environment}
      CodeUri: ../formalizesehub-retenciones/services/crear-retencion/dist.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Crea una nueva retención tributaria
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref FormalizeSEApi
            Path: /retenciones
            Method: POST

  ActualizarRetencionFunction:
    Type: AWS::Serverless::Function
    Properties:
